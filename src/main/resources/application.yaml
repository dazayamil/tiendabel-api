spring:
  application:
    name: tiendabel

  datasource:
    url: jdbc:mysql://localhost:3306/tiendabel
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

